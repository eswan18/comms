apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: comms-prod-secrets
  namespace: comms-prod
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/ethans-services/secrets/comms_prod_resend_api_key/versions/latest"
        path: "RESEND_API_KEY"
  secretObjects:
    - secretName: comms-prod-secrets
      type: Opaque
      data:
        - objectName: "RESEND_API_KEY"
          key: RESEND_API_KEY
