options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/ethans-services/containers/comms:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/ethans-services/containers/comms:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/ethans-services/containers/comms'

images:
  - 'us-central1-docker.pkg.dev/ethans-services/containers/comms:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/ethans-services/containers/comms:latest'
